<div class="cars-container">
  <div *ngFor="let car of cars" class="car-card">
    <div class="car-image">
      <img [src]="'https://car-rental-backend-aszs.onrender.com/' + car.imageUrl" alt="{{ car.name }}">
    </div>

    <div class="car-details">
      <h3>{{ car.name }}</h3>
      <p class="model">Model: {{ car.model }}</p>
      <p class="price">₹{{ car.pricePerDay }}/day</p>
    </div>
 <a 
      class="whatsapp-btn" 
      [href]="'https://wa.me/917013016332?text=Hello, I am interested in the ' + car.name + ' car.'" 
      target="_blank">
      Chat on WhatsApp
    </a>
    <button class="book-btn" [routerLink]="['/booking', car.id]">
      Book Now
    </button>
  </div>
</div>
