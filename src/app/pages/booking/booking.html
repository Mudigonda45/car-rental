<h2 class="title">Book Car</h2>

<form class="booking-form" (ngSubmit)="bookCar()" #bookingForm="ngForm">

  <div class="form-group">
    <label for="name">Name :</label>
    <input 
      type="text"
      id="name"
      name="name"
      [(ngModel)]="booking.name"
      required
      placeholder="Enter your full name">
  </div>

  <div class="form-group">
    <label for="email">Email :</label>
    <input 
      type="email"
      id="email"
      name="email"
      [(ngModel)]="booking.email"
      required
      placeholder="Enter your email">
  </div>

  <div class="form-group">
    <label for="phone">Phone :</label>
    <input 
      type="text"
      id="phone"
      name="phone"
      [(ngModel)]="booking.phone"
      required
      placeholder="Enter your phone number">
  </div>

  <div class="form-group">
    <label for="pickupDate">Pickup Date :</label>
    <input 
      type="date"
      id="pickupDate"
      name="pickupDate"
      [(ngModel)]="booking.pickupDate"
      required>
  </div>

  <div class="form-group">
    <label for="returnDate">Return Date :</label>
    <input 
      type="date"
      id="returnDate"
      name="returnDate"
      [(ngModel)]="booking.returnDate"
      required>
  </div>

  <button type="submit" [disabled]="bookingForm.invalid">
    Continue Payment
  </button>

</form>
